version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gaap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gaap
      POSTGRES_PASSWORD: gaap_secret_2024
      POSTGRES_DB: gaap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaap -d gaap_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gaap-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gaap:gaap_secret_2024@postgres:5432/gaap_db
      JWT_SECRET: gaap_jwt_super_secret_change_in_production_2024
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gaap-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  postgres_data:
  uploads:
